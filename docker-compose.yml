version: '3.8'

services:
  jianguoyun-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jianguoyun-app
    restart: unless-stopped
    ports:
      - "8081:8081"
    volumes:
      # 挂载配置文件
      - ./config.ini:/app/config.ini
      # 挂载日志目录
      - ./logs:/app/logs
      # 挂载缓存目录
      - ./cache:/app/cache
      # 挂载数据目录（可选）
      - ./data:/app/data
    environment:
      - TZ=Asia/Shanghai
    networks:
      - jianguoyun-network

  # 可选：MySQL 数据库（如果需要）
  mysql:
    image: mysql:8.0
    container_name: jianguoyun-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: your_mysql_password
      MYSQL_DATABASE: jianguoyun_db
      MYSQL_USER: jianguoyun
      MYSQL_PASSWORD: jianguoyun_password
      TZ: Asia/Shanghai
    networks:
      - jianguoyun-network
    profiles:
      - with-mysql

networks:
  jianguoyun-network:
    driver: bridge

volumes:
  mysql-data:
